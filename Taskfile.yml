version: '3'

vars:
  BINARY: pack2d-benchmark
  BIN_DIR: bin
  MODULE: github.com/gemineo/pack2d-benchmark
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  LDFLAGS: -trimpath -ldflags="-s -w -X main.version={{.VERSION}}"

tasks:
  build:
    desc: Build the benchmark binary into bin/ with version injection
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build {{.LDFLAGS}} -o {{.BIN_DIR}}/{{.BINARY}} ./cmd/{{.BINARY}}

  run:
    desc: Build and run the benchmark tool
    deps: [build]
    cmds:
      - ./{{.BIN_DIR}}/{{.BINARY}}

  test:
    desc: Run all tests with the race detector
    cmds:
      - go test -race -count=1 ./...

  test:pkg:
    desc: "Test a single package — usage: task test:pkg PKG=./internal/runner/..."
    cmds:
      - go test -race {{.PKG}}
    requires:
      vars: [PKG]

  test:run:
    desc: "Run a single test — usage: task test:run NAME=TestEncode PKG=./internal/runner/..."
    cmds:
      - go test -race -run {{.NAME}} -v {{.PKG}}
    requires:
      vars: [NAME, PKG]

  coverage:
    desc: Run tests and open HTML coverage report
    cmds:
      - go test -race -count=1 -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  fmt:
    desc: Format all source files (goimports + gofmt)
    cmds:
      - goimports -w .
      - gofmt -w .

  fmt:check:
    desc: Check formatting without modifying files (for CI)
    cmds:
      - test -z "$(goimports -l .)"

  tidy:
    desc: Tidy go.mod / go.sum
    cmds:
      - go mod tidy

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BIN_DIR}} coverage.out coverage.html

  ci:
    desc: Full CI pipeline — format check, vet, race tests, lint
    cmds:
      - task: fmt:check
      - task: vet
      - task: test
      - task: lint

  default:
    desc: List all available tasks
    cmds:
      - task --list
    silent: true
